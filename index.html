<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor Simulator</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>

  <div id="app">
    <!-- Screens are injected here by ui/ scripts -->
    <p>Loading...</p>
  </div>

  <!-- Shared utilities -->
  <script src="src/util.js"></script>

  <!-- Data -->
  <script src="src/data/contestants.js"></script>
  <script src="src/data/season.js"></script>
  <script src="src/data/flavor.js"></script>
  <!-- v4: schema definitions + season template architecture (groundwork) -->
  <script src="src/data/schema.js"></script>
  <script src="src/data/seasonPresets.js"></script>
  <script src="src/data/shows.js"></script>
  <!-- v10.9: pre-built season templates. One file per season. Must load
       before seasons.js so resolveTemplate() can find the constants. -->
  <script src="src/data/seasons/sample-prebuilt.js"></script>
  <script src="src/data/seasons.js"></script>
  <script src="src/data/savedSetups.js"></script>
  <script src="src/data/setupIo.js"></script>

  <!-- Engine -->
  <script src="src/engine/eventLog.js"></script>
  <script src="src/engine/idols.js"></script>
  <script src="src/engine/relationships.js"></script>
  <script src="src/engine/alliances.js"></script>
  <script src="src/engine/campLife.js"></script>
  <script src="src/engine/challenge.js"></script>
  <script src="src/engine/vote.js"></script>
  <script src="src/engine/jury.js"></script>
  <script src="src/engine/finalTribal.js"></script>

  <!-- UI -->
  <!-- v10.0 landing + show pages — load before screenSelect so the screen router can dispatch them -->
  <script src="src/ui/screenLanding.js"></script>
  <script src="src/ui/screenShowSeasons.js"></script>

  <!-- v9.3 reusable components (portrait, name format) — must load before any screen file that uses them -->
  <script src="src/ui/components/playerPortrait.js"></script>
  <script src="src/ui/components/contestantStats.js"></script>
  <script src="src/ui/components/voteTargetCard.js"></script>
  <script src="src/ui/components/voteRevealCard.js"></script>
  <script src="src/ui/screenSelect.js"></script>
  <script src="src/ui/screenCastEditor.js"></script>
  <script src="src/ui/screenRulesEditor.js"></script>
  <script src="src/ui/screenSavedSetups.js"></script>
  <script src="src/ui/screenTemplates.js"></script>
  <script src="src/ui/screenSwap.js"></script>
  <script src="src/ui/screenMerge.js"></script>
  <script src="src/ui/screenCampLife.js"></script>
  <script src="src/ui/screenRewardChallenge.js"></script>
  <script src="src/ui/screenChallenge.js"></script>
  <script src="src/ui/screenEpisodeRecap.js"></script>
  <script src="src/ui/screenTribal.js"></script>
  <script src="src/ui/screenElimination.js"></script>
  <script src="src/ui/screenFinalTribal.js"></script>
  <script src="src/ui/screenResults.js"></script>

  <!-- Boot -->
  <script src="src/main.js"></script>

  <!-- Dev panel — remove this line (and src/dev/devPanel.js) before publishing -->
  <script src="src/dev/devPanel.js"></script>

</body>
</html>
